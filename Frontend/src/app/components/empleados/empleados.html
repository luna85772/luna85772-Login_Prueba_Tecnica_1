<div class="card shadow-lg border-0 rounded-lg h-100">
  <div class="card-header bg-gradient text-white py-4">
    <h5 class="mb-0"><i class="bi bi-people"></i> Gestión de Empleados</h5>
  </div>
  <div class="card-body p-4">
    <form (ngSubmit)="guardarEmpleado()" class="mb-4">
      <div class="row g-3">
        <div class="col-12 col-sm-6">
          <label class="form-label small fw-bold text-muted">Nombre</label>
          <input type="text"
                 [(ngModel)]="empleado.nombre"
                 name="nombre"
                 class="form-control form-control-lg"
                 placeholder="Ej: Juan"
                 required>
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label small fw-bold text-muted">Apellido</label>
          <input type="text"
                 [(ngModel)]="empleado.apellido"
                 name="apellido"
                 class="form-control form-control-lg"
                 placeholder="Ej: Pérez"
                 required>
        </div>
        <div class="col-12">
          <label class="form-label small fw-bold text-muted">Departamento</label>
          <select [(ngModel)]="empleado.departamentoId"
                  name="depto"
                  class="form-select form-select-lg"
                  required>
            <option value="" disabled selected>Selecciona un departamento</option>
            <option *ngFor="let d of departamentos" [value]="d._id">{{ d.nombre }}</option>
          </select>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-check-circle"></i> Guardar Empleado
          </button>
        </div>
      </div>
    </form>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th><i class="bi bi-person"></i> Empleado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let emp of empleados; let last = last" [class.border-bottom]="!last">
            <td class="fw-500">{{ emp.nombre }} {{ emp.apellido }}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-danger" (click)="eliminar(emp._id)">
                <i class="bi bi-trash"></i> Eliminar
              </button>
            </td>
          </tr>
          <tr *ngIf="empleados.length === 0">
            <td colspan="2" class="text-center text-muted py-4">
              <small>No hay empleados. ¡Crea uno para comenzar!</small>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="card shadow-lg border-0 rounded-lg h-100">
  <div class="card-header bg-gradient text-white py-4">
    <h5 class="mb-0"><i class="bi bi-building"></i> Gestión de Departamentos</h5>
  </div>
  <div class="card-body p-4">
    <form (ngSubmit)="agregarDepto()" class="mb-4">
      <div class="input-group">
        <input type="text"
               [(ngModel)]="nuevoDepto.nombre"
               name="nombre"
               class="form-control form-control-lg"
               placeholder="Nombre del departamento"
               required>
        <button class="btn btn-success btn-lg" type="submit">
          <i class="bi bi-plus-circle"></i> Agregar
        </button>
      </div>
    </form>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th><i class="bi bi-tag"></i> Departamento</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let d of departamentos; let last = last" [class.border-bottom]="!last">
            <td class="fw-500">{{ d.nombre }}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-danger" (click)="eliminar(d._id)">
                <i class="bi bi-trash"></i> Eliminar
              </button>
            </td>
          </tr>
          <tr *ngIf="departamentos.length === 0">
            <td colspan="2" class="text-center text-muted py-4">
              <small>No hay departamentos. ¡Crea uno para comenzar!</small>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
